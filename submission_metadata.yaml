ai_usage_summary: |
  Used Gemini (Antigravity IDE) as a pair-programming assistant for architecture
  discussion, code generation, and iterative testing. The agent performed code
  review, critical design audits, and assumption challenges. No candidate data
  was fed to any external LLM. All ranking logic is deterministic and runs
  entirely offline.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  7-stage pipeline: LOAD -> JD_EXTRACT -> RETRIEVE -> SCORE -> RANK -> REASON -> OUTPUT.

  Core insight: the JD contains 14 explicit, scorable requirements. A structured
  JDRequirements data object is extracted once and drives every retrieval query
  and scoring decision.

  Hybrid retrieval (BM25 + Dense via sentence-transformers/all-MiniLM-L6-v2 +
  FAISS) with Reciprocal Rank Fusion narrows 100K to 500. Dense retrieval catches
  candidates who describe ranking/search/recommendation work in plain language
  without standard ML vocabulary.

  Feature scoring combines technical relevance (55%), career structure (15%),
  behavioral engagement (15%), logistical fit (10%), and misc signals (5%).
  A steep sigmoid gate replaces hard thresholds. Skills are cross-validated
  against career descriptions — keyword stuffing is penalized multiplicatively.

  8-rule honeypot detector catches logical impossibilities (salary inversion,
  temporal impossibilities, skill/duration mismatches). Result: 0 honeypots in
  top 100.

  Runtime: ~23s on CPU for 100K candidates. No GPU, no network.

